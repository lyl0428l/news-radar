name: 推送代码后通知服务器更新

on:
  push:
    branches: [ master ]
    paths:
      # 只有以下文件变更时才触发（忽略文档、配置等无关文件）
      - 'crawlers/**'
      - 'utils/**'
      - 'web/**'
      - 'config.py'
      - 'main.py'
      - 'scheduler.py'
      - 'storage.py'
      - 'models.py'
      - 'media_storage.py'
      - 'run_web.py'
      - 'server_receiver.py'
      - 'logging_config.py'

jobs:
  notify-update:
    name: 通知阿里云服务器拉取更新
    runs-on: ubuntu-latest

    steps:
      - name: 通知服务器执行更新任务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            powershell -ExecutionPolicy Bypass -NonInteractive -File "C:\news_crawler\auto_update.ps1"
