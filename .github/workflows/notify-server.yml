name: 推送代码后通知服务器更新

on:
  push:
    branches: [ master ]
    paths:
      - 'crawlers/**'
      - 'utils/**'
      - 'web/**'
      - 'config.py'
      - 'main.py'
      - 'scheduler.py'
      - 'storage.py'
      - 'models.py'
      - 'media_storage.py'
      - 'run_web.py'
      - 'server_receiver.py'
      - 'logging_config.py'
      - 'auto_update.ps1'
      - 'start_services.ps1'

jobs:
  notify-update:
    name: 通知阿里云服务器拉取更新
    runs-on: ubuntu-latest

    steps:
      - name: 通知服务器执行更新任务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            powershell -ExecutionPolicy Bypass -NonInteractive -File "C:\news_crawler\auto_update.ps1"
